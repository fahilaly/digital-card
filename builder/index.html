<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Card Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- JSZip for exporting folder -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <!-- Control Panel -->
    <div class="panel">
        <div class="panel-header">
            <h1>Digital Card Builder</h1>
            <p>Customize and download your card for free.</p>
        </div>

        <div class="form-group">
            <h2>Personal Info</h2>
            <label>First Name</label>
            <input type="text" id="in-first" value="JOHN">
            
            <label>Last Name</label>
            <input type="text" id="in-last" value="DOE">

            <label>Role</label>
            <input type="text" id="in-role" value="Software Developer">

            <label>Tagline</label>
            <input type="text" id="in-tagline" value="Building beautiful digital solutions.">

            <label>Monogram (Back)</label>
            <input type="text" id="in-monogram" value="J.D.">
        </div>

        <div class="form-group">
            <h2>Appearance</h2>
            <label>Theme</label>
            <select id="in-theme">
                <option value="white">Studio White</option>
                <option value="midnight">Midnight</option>
                <option value="glass">Glassmorphism</option>
                <option value="neon">Neon Cyberpunk</option>
            </select>
        </div>

        <div class="form-group">
            <h2>Links</h2>
            <div class="links-list" id="links-container">
                <!-- Injected via JS -->
            </div>
            <button class="add-link-btn" id="btn-add-link">+ Add Link</button>
        </div>

        <div class="export-panel">
            <div class="live-link-box">
                <p>Deploy Instantly:</p>
                <div class="link-split">
                    <input type="text" id="live-link-output" readonly value="https://fahilaly.github.io/digital-card/">
                    <button id="btn-shorten-link">Shorten</button>
                    <button id="btn-copy-link">Copy</button>
                </div>
            </div>
            <div class="divider">OR</div>
            <button class="btn-export" id="btn-export">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Source (.zip)
            </button>
        </div>
    </div>

    <!-- Live Preview -->
    <div class="preview-area">
        <div class="preview-badge">LIVE PREVIEW</div>
        <div class="preview-container">
            <iframe id="preview-frame" src="../index.html"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
